<!DOCTYPE html>
<html>
    <head>
        <title>Sample Table</title>
    </head>
    <body>
        <table border="1"
               align="center"
               cellpadding="10">
            <!--column1-->
            <tr>
                <th>Column1</th>
                <th>Column2</th>
                <th>Column3</th>
            </tr>
            <!--second row-->
            <tr>
                <td rowspan="2">row1 cell 1</td>
                <td> row1 col2</td>
                <td>row1 col3</td>
            </tr>
            <tr>
                <td>row2 col2</td>
                <td>row2 cell3</td>
            </tr>
            <tr>
                <td colspan="3"> Row3 cell1</td>
            </tr>

        </table>
    </body>
</html>
