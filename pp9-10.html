<!DOCTYPE html>
<html>
    <head>
        <title>practice table</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="pp9-10.css">
    </head>
    <body>
        <table border="1"
                cellpadding="20"
                cellspacing="0"
                >
        
        <!--first row-->
        <tr>
            <th>SNO</th>
            <th>NAME</th>
            <th>COST</th>
            <th>UPDATE</th>
            <th>DELETE</th>
        </tr>
        <tr>
            <td>1</td>
            <td>LAPTOP</td>
            <td><i class="fa fa-rupee"></i>500</td>
            <td><i class="fa fa-edit"> </i></td>
            <td><i class="fa fa-trash"></i></td>
        </tr>
        <tr>
            <td>2</td>
            <td>Mobile</td>
            <td><i class="fa fa-dollar"></i>50</td>
            <td><i class="fa fa-edit"> </i></td>
            <td><i class="fa fa-trash"></i></td>
        </tr>
        <tr>
            <td>3</td>
            <td>Shoes</td>
            <td><i class="fa fa-euro"></i>10</td>
            <td><i class="fa fa-edit"> </i></td>
            <td><i class="fa fa-trash"></i></td>
        </tr>

        </table>
    </body>
</html>
