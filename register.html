    <body>
        <h1> EMPLOYEE MANAGEMENT SYSTEM</h1>

        <h2>Employee Registration Form</h2>
        <form >
            <table>
                <tr>
                    <td><label>Name</label></td>
                    <td><input type="name" placeholder="enter name:"></td>
                </tr>
                <tr>
                    <td><label>Password</label></td>
                    <td><input type="password" placeholder="enter password:"></td>
                </tr>
                <tr>
                    <td><label> email</label></td>
                    <td><input type="email" placeholder="enter valid email:"></td>

                </tr>
                <tr>
                    <td><label> Gender</label></td>
                    <td><input type="radio" value="male">Male</td>
                    <td><input type="radio" value="female">Female</td>
                </tr>
                <tr>
                    <td><label> Mobile no:</label></td>
                    <td><input type="text" placeholder="enter mobile number"></td>
                </tr>
                <tr>
                    <td><label>Address</label></td>
                    <td><textarea name="address" id="address" rows="4" cols="40" placeholder="enter your address"></textarea></td>
                </tr>
                <tr>
                    <td><input type="submit" value="register"></td>
                </tr>
            </table>
        </form>
      
   </body>
