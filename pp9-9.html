<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" href="pp9-9.css">
    </head>
    <body>
        <table border="1"
                cellspacing="0"
                cellpadding="20">
            <!--first row-->
            <tr id="id1">
                <td colspan="4">0</td>
            </tr>
            <!--second row-->
            <tr id="id2">
                <td>+</td>
                <td>-</td>
                <td>*</td>
                <td>/</td>
            </tr>
            <tr >
                <td>7</td>
                <td>8</td>
                <td>9</td>
                <td rowspan="4" id="id3">=</td>
            </tr>
            <tr>
                <td>4</td>
                <td>5</td>
                <td>6</td>
            </tr>
            <tr>
                <td>1</td>
                <td>2</td>
                <td>3</td>
            </tr>
            <tr>
                <td>0</td>
                <td>.</td>
                <td>AC</td>
            </tr>
        </table>
    </body>
</html>
